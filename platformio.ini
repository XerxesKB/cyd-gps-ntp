[platformio]
default_envs = cyd_ota

; Gemeinsame Einstellungen für alle Environments
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    mikalhart/TinyGPSPlus@^1.0.3
    tzapu/WiFiManager@^2.0.17
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DUSE_HSPI_PORT=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_INVERSION_ON=1
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=27000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

; OTA-Upload (Standard ab v0.2.0)
[env:cyd_ota]
upload_protocol = espota
upload_port = time.local
upload_flags = --auth=cyd-ntp

; USB-Fallback: initialer Flash oder Recovery
[env:cyd_usb]
upload_speed = 921600
